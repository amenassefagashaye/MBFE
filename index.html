    <!-- ==================== ENHANCED AUDIO & WEBSOCKET SCRIPT ==================== -->
    <script>
        (function() {
            // ---------- BROWSER PROTECTION ----------
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || e.keyCode === 123 || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u') || (e.ctrlKey && e.shiftKey && e.key === 'J') || (e.ctrlKey && e.shiftKey && e.key === 'C')) {
                    e.preventDefault(); return false;
                }
            });
            let devToolsOpen = false;
            const element = new Image();
            Object.defineProperty(element, 'id', { get: function() { devToolsOpen = true; return 'dev'; } });
            setInterval(() => { devToolsOpen = false; console.log(element); console.clear(); if (devToolsOpen) document.body.innerHTML = '<div class="protect-overlay">⚠️ Developer Tools Detected ⚠️</div>'; }, 1000);

            // ---------- GLOBAL STATE ----------
            window.gameState = window.gameState || {};
            const gs = window.gameState;
            gs.audioUnlocked = false;
            gs.audioQueue = [];
            gs.currentAudio = null;

            // ---------- AUDIO MANAGER ----------
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            // unlock audio on first user interaction
            function unlockAudio() {
                if (gs.audioUnlocked) return;
                audioCtx.resume().then(() => {
                    gs.audioUnlocked = true;
                    console.log('audio unlocked');
                    // play silent buffer to activate
                    const buffer = audioCtx.createBuffer(1, 1, 22050);
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(audioCtx.destination);
                    source.start(0);
                }).catch(e => console.warn('AudioContext resume failed', e));
            }
            document.addEventListener('click', unlockAudio, { once: true });
            document.addEventListener('touchstart', unlockAudio, { once: true });

            // preload all audio files as Howl? but keep simple: use Audio elements + preload
            function preloadAllAudio() {
                const files = [
                    'Welcome_cleaned.wav', 'Pattern_cleaned.wav', 'Kartela registered_cleaned.wav',
                    'Game round_cleaned.wav', 'Shuffle_cleaned.wav', 'Game started_cleaned.wav',
                    'Game stopped_cleaned.wav', 'Game continued_cleaned.wav', 'Kartela not registered_cleaned.wav',
                    'Not winner_cleaned.wav', 'Kartela not ours_cleaned.wav', 'Winner_cleaned.wav'
                ];
                for (let i = 1; i <= 75; i++) {
                    let letter = 'B';
                    if (i >= 16 && i <= 30) letter = 'I';
                    else if (i >= 31 && i <= 45) letter = 'N';
                    else if (i >= 46 && i <= 60) letter = 'G';
                    else if (i >= 61 && i <= 75) letter = 'O';
                    files.push(`${letter}${i}_cleaned.wav`);
                }
                const container = document.getElementById('audio-container');
                files.forEach(file => {
                    const audio = document.createElement('audio');
                    audio.id = `audio_${file.replace(/_cleaned\.wav$/, '').replace(/[^a-zA-Z0-9]/g, '')}`;
                    // using relative path – adjust if needed for GitHub Pages (same folder /audio/)
                    audio.src = `audio/${file}`;
                    audio.preload = 'auto';
                    audio.load();
                    container.appendChild(audio);
                });
            }
            preloadAllAudio();

            function playAudioById(id, allowOverlap = false) {
                if (!gs.audioUnlocked) {
                    gs.audioQueue.push({ id, allowOverlap });
                    return;
                }
                const audio = document.getElementById(id);
                if (!audio) return;
                if (!allowOverlap && gs.currentAudio && !gs.currentAudio.ended) {
                    try { gs.currentAudio.pause(); gs.currentAudio.currentTime = 0; } catch (e) {}
                }
                audio.currentTime = 0;
                audio.play().catch(e => console.warn('playback error', e));
                gs.currentAudio = audio;
            }

            // number audio: id format audio_B1, audio_B2 etc.
            function playNumberAudio(letter, number) {
                const id = `audio_${letter}${number}`;
                playAudioById(id, false);
            }

            // expose globally
            window.playAudioById = playAudioById;
            window.playNumberAudio = playNumberAudio;

            // override original playAudio (if exists) to use our manager
            window.playAudio = function(name) {
                const id = `audio_${name.replace(/[^a-zA-Z0-9]/g, '')}`;
                playAudioById(id, false);
            };

            // ---------- WEBSOCKET (Deno Deploy) ----------
            const WS_URL = 'wss://ameng-gogs-mbbe-91.deno.dev/'; // your endpoint
            let ws = null;
            function connectWebSocket() {
                ws = new WebSocket(WS_URL);
                ws.onopen = () => console.log('WebSocket connected');
                ws.onmessage = (ev) => {
                    const data = JSON.parse(ev.data);
                    handleWsMessage(data);
                };
                ws.onclose = () => setTimeout(connectWebSocket, 3000);
            }
            function handleWsMessage(data) {
                switch (data.type) {
                    case 'number_called':
                        if (data.number) {
                            // add a small delay to avoid race with UI update
                            setTimeout(() => {
                                const num = data.number;
                                let letter = 'B';
                                if (num >= 16 && num <= 30) letter = 'I';
                                else if (num >= 31 && num <= 45) letter = 'N';
                                else if (num >= 46 && num <= 60) letter = 'G';
                                else if (num >= 61 && num <= 75) letter = 'O';
                                playNumberAudio(letter, num);
                            }, 250);
                        }
                        break;
                    case 'game_state':
                        // sync called numbers etc.
                        break;
                    default: break;
                }
            }
            connectWebSocket();

            // ---------- INTEGRATE WITH EXISTING LOGIC ----------
            // We'll wrap original functions to include audio triggers as per spec.

            // 1) login page Next button: plays Welcome_cleaned.wav (already included in original login but ensure)
            const originalLogin = window.login;
            window.login = function() {
                playAudioById('audio_Welcome', false);
                if (originalLogin) originalLogin();
            };

            // 2) Pattern selection: each pattern card click plays Pattern_cleaned.wav
            // we modify selectPattern
            const originalSelectPattern = window.selectPattern;
            window.selectPattern = function(i) {
                playAudioById('audio_Pattern', false);
                if (originalSelectPattern) originalSelectPattern(i);
            };

            // 3) Board selection: toggleBoardSelection – play Kartela registered_cleaned.wav when selecting new
            const originalToggleBoard = window.toggleBoardSelection;
            window.toggleBoardSelection = function(num, el) {
                const wasSelected = gameState.selectedBoards && gameState.selectedBoards.has(num);
                if (!wasSelected) {
                    playAudioById('audio_Kartelaregistered', false);
                }
                if (originalToggleBoard) originalToggleBoard(num, el);
            };

            // 4) Game / Round button: setGameAmount / setRounds – play Game round_cleaned.wav
            const originalSetGameAmount = window.setGameAmount;
            window.setGameAmount = function(a) {
                playAudioById('audio_Gameround', false);
                if (originalSetGameAmount) originalSetGameAmount(a);
            };
            const originalSetRounds = window.setRounds;
            window.setRounds = function(r) {
                playAudioById('audio_Gameround', false);
                if (originalSetRounds) originalSetRounds(r);
            };

            // 5) Shuffle button: play Shuffle_cleaned.wav twice (with small delay)
            const originalShuffle = window.shuffleNumbers;
            window.shuffleNumbers = function() {
                playAudioById('audio_Shuffle', false);
                setTimeout(() => playAudioById('audio_Shuffle', false), 300);
                if (originalShuffle) originalShuffle();
            };

            // 6) Play/Stop/Continue – toggleGamePlay
            const originalTogglePlay = window.toggleGamePlay;
            window.toggleGamePlay = function() {
                const state = gameState.playState; // 0 stopped,1 playing,2 paused
                if (state === 0) { // start
                    playAudioById('audio_Gamestarted', false);
                } else if (state === 1) { // stop
                    playAudioById('audio_Gamestopped', false);
                } else if (state === 2) { // continue
                    playAudioById('audio_Gamecontinued', false);
                }
                if (originalTogglePlay) originalTogglePlay();
            };

            // 7) Check winner section
            const originalCheckWinner = window.checkWinner;
            window.checkWinner = function() {
                const inp = document.getElementById('board-check-input').value.trim();
